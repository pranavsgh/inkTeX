services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend/weights:/app/weights
      - ../backend/data:/app/data
    networks:
      - inktex

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - inktex

networks:
  inktex:
    driver: bridge
